<div class="web3-onboard-wrapper d-flex gap-2">
  @if (isConnected) {
    <button class="btn btn-outline-primary d-flex align-items-center gap-2" (click)="disconnectWallet()">
      <span class="address-badge">{{ address }}</span>
      @if (chainName) {
        <span class="chain-badge">{{ chainName }}</span>
      }
    </button>
  } @else {
    <button class="btn btn-primary" (click)="connectWallet()">
      Connect Wallet
    </button>
  }
</div>
